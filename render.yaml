services:
  - type: web
    name: swingtrader-nse
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8000
      - key: SERVE_FRONTEND
        value: "1"
